[phases.setup]
nixPkgs = ["php83", "php83Packages.composer", "php83Extensions.mysqli", "php83Extensions.pdo_mysql", "php83Extensions.mbstring", "php83Extensions.xml", "php83Extensions.curl", "php83Extensions.zip", "php83Extensions.tokenizer", "php83Extensions.fileinfo"]

[phases.build]
cmds = ["composer install --no-dev --optimize-autoloader"]

[phases.deploy]
cmds = ["php artisan config:clear", "php artisan migrate --force"]